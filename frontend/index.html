<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="TeamFlow — Professional Project & Team Management Portal" />
    <title>TeamFlow Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet" />
    <style>
      .wraper { max-width: 1200px; margin: 0 auto;}
      *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
      html { scroll-behavior: smooth; }
      body {
        background: #080c14;
        color: #e8edf5;
        font-family: 'DM Sans', sans-serif;
        overflow-x: hidden;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
    
      ::-webkit-scrollbar { width: 5px; }
      ::-webkit-scrollbar-track { background: #0a0f1a; }
      ::-webkit-scrollbar-thumb { background: rgba(0,212,255,0.25); border-radius: 4px; }
      ::-webkit-scrollbar-thumb:hover { background: rgba(0,212,255,0.5); }
      #root { min-height: 100vh; }
    </style>
  </head>
  <body>
    <div class="wraper">
    <div id="root"></div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
